routes:
  /contact/:
    template: contact
    data: page.contact
  /blog/:
    template: blog
    controller: channel
    data: page.blog
    filter: tags:-[hash-overlays]
  /tags/:
    template: tags
    data: page.tags
  /works/:
    template: works
    data: page.works
  /now/:
    template: now
    controller: channel
    data: page.now
    filter: tag:now
  /books/:
    template: books
    controller: channel
    data: page.books
    filter: tags:books+tags:-hash-book-reading
  /archive/:
    template: archive
    controller: channel
    data: page.archive
    order: published_at desc
    filter: tags:-[now]
  /feed/:
    template: feed
    content_type: text/xml
    filter: tags:-[hash-overlays]
collections:
  /:
    permalink: /{slug}/
    template: index
    filter: tags:-[hash-overlays]

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/
