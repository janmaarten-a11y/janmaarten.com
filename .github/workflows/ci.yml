name: CI

on:
  pull_request:
    branches:
      - main
  merge_group:

jobs:
  validate:
    name: Validate Theme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx gulp build
      - run: npm test
